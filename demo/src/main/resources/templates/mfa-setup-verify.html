<!DOCTYPE html>
<html lang="it" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Verifica dispositivo MFA</title>

    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: Inter, Arial, Helvetica, sans-serif;
            background:
                    radial-gradient(circle at top right, rgba(16, 185, 129, 0.16), transparent 30%),
                    linear-gradient(135deg, #eef2ff, #f8fafc);
            color: #111827;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .page {
            width: 100%;
            max-width: 460px;
            padding: 24px;
        }

        .card {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 28px;
            padding: 34px;
            box-shadow: 0 30px 80px rgba(15, 23, 42, 0.16);
            border: 1px solid rgba(148, 163, 184, 0.28);
            backdrop-filter: blur(12px);
        }

        .top-icon {
            width: 66px;
            height: 66px;
            border-radius: 22px;
            background: #ecfdf5;
            color: #059669;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 30px;
            margin-bottom: 20px;
        }

        .badge {
            display: inline-flex;
            padding: 7px 13px;
            border-radius: 999px;
            background: #ecfdf5;
            color: #047857;
            font-size: 13px;
            font-weight: 800;
            margin-bottom: 16px;
        }

        h1 {
            margin: 0 0 10px;
            font-size: 30px;
            line-height: 1.16;
            letter-spacing: -0.03em;
        }

        .subtitle {
            margin: 0 0 28px;
            color: #64748b;
            line-height: 1.55;
            font-size: 15px;
        }

        .otp-panel {
            padding: 18px;
            border-radius: 20px;
            background: #f8fafc;
            border: 1px solid #e2e8f0;
            margin-bottom: 22px;
        }

        label {
            display: block;
            margin-bottom: 10px;
            font-size: 14px;
            font-weight: 800;
            color: #334155;
        }

        input {
            width: 100%;
            height: 56px;
            border-radius: 16px;
            border: 1px solid #cbd5e1;
            padding: 0 16px;
            font-size: 22px;
            letter-spacing: 0.24em;
            text-align: center;
            outline: none;
            background: #ffffff;
            transition: border-color 0.15s ease, box-shadow 0.15s ease;
        }

        input:focus {
            border-color: #10b981;
            box-shadow: 0 0 0 4px rgba(16, 185, 129, 0.13);
        }

        .input-hint {
            margin: 10px 0 0;
            color: #94a3b8;
            font-size: 12px;
            text-align: center;
        }

        button {
            width: 100%;
            height: 50px;
            border: none;
            border-radius: 16px;
            background: #059669;
            color: white;
            font-size: 15px;
            font-weight: 900;
            cursor: pointer;
            box-shadow: 0 16px 30px rgba(5, 150, 105, 0.25);
            transition: transform 0.12s ease, background 0.12s ease, box-shadow 0.12s ease;
        }

        button:hover {
            background: #047857;
            transform: translateY(-1px);
            box-shadow: 0 18px 34px rgba(5, 150, 105, 0.31);
        }

        button:active {
            transform: translateY(0);
        }

        .error {
            margin-top: 18px;
            padding: 13px 14px;
            border-radius: 16px;
            background: #fef2f2;
            color: #b91c1c;
            border: 1px solid #fecaca;
            font-size: 14px;
            font-weight: 700;
            line-height: 1.45;
        }

        .hint {
            margin-top: 18px;
            color: #64748b;
            font-size: 13px;
            line-height: 1.5;
            text-align: center;
        }
    </style>
</head>
<body>

<div class="page">
    <div class="card">
        <div class="top-icon">✓</div>

        <span class="badge">Verifica dispositivo</span>

        <h1>Inserisci il codice OTP</h1>

        <p class="subtitle">
            Ora apri l’app Authenticator e inserisci il codice a 6 cifre appena generato
            per confermare la registrazione del dispositivo.
        </p>

        <form method="post" action="/mfa/setup/verify">
            <div class="otp-panel">
                <label for="code">Codice OTP</label>
                <input
                        id="code"
                        name="code"
                        type="text"
                        inputmode="numeric"
                        pattern="[0-9]{6}"
                        maxlength="6"
                        placeholder="000000"
                        autocomplete="one-time-code"
                        required>

                <p class="input-hint">Il codice cambia ogni 30 secondi.</p>
            </div>

            <button type="submit">Verifica dispositivo</button>
        </form>

        <p class="error" th:if="${error}" th:text="${error}"></p>

        <p class="hint">
            Se il codice non viene accettato, attendi il codice successivo e riprova.
        </p>
    </div>
</div>

</body>
</html>
